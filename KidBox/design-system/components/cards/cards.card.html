<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; background:var(--kb-bg); font-family:var(--kb-font-sans); padding:22px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  .lbl { font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--kb-text-secondary); margin-bottom:8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { HomeCard, HeroCard, SettingsCard, CategoryCard, InviteCard, Chip } = window.KidBoxDesignSystem_d1a58b;
const Note = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M6 3h9l3 3v15H6z"/><path d="M9 9h6M9 13h6M9 17h4"/></svg>;
const Cal = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>;
const Heart = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.6-9.5-9C.8 8.4 2.4 5 5.8 5c1.9 0 3.3 1 4.2 2.4C11 6 12.4 5 14.3 5c3.4 0 5 3.4 3.3 7-2.5 4.4-9.6 9-9.6 9z"/></svg>;
const Sun = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>;
const Chevron = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m9 18 6-6-6-6"/></svg>;
function Demo() {
  return (
    <div>
      <div className="lbl">HomeCard (Home grid tiles)</div>
      <div className="grid2">
        <HomeCard title="Note" subtitle="Appunti veloci" tint="var(--kb-cat-yellow)" icon={<Note/>} badge={2} />
        <HomeCard title="Calendario" subtitle="Eventi e affidamenti" tint="var(--kb-cat-purple)" icon={<Cal/>} />
        <HomeCard title="Salute" subtitle="Health tracker" tint="var(--kb-cat-red)" icon={<Heart/>} />
        <HomeCard title="Viaggi" subtitle="Piano Pro o Max per l'AI" tint="var(--kb-cat-teal)" icon={<Heart/>} locked />
      </div>
      <div className="lbl">HeroCard</div>
      <div style={{marginBottom:16}}>
        <HeroCard title="Famiglia Scocca" dateText="lunedì 6 luglio" badgeText="3 membri" height={200} />
      </div>
      <div className="grid2">
        <div>
          <div className="lbl">SettingsCard</div>
          <SettingsCard title="Aspetto" subtitle="Chiaro, scuro o sistema" icon={<Sun/>} trailing={<Chevron/>} />
        </div>
        <div>
          <div className="lbl">CategoryCard</div>
          <CategoryCard title="Referti medici" syncLabel="Sincronizzato" syncTone="green" />
        </div>
      </div>
      <div className="lbl">InviteCard</div>
      <InviteCard />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
