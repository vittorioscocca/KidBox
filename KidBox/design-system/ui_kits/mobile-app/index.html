<!-- @dsCard group="Mobile App" viewport="900x920" name="KidBox iOS/Android — Home · Documenti · Impostazioni" subtitle="Click-through recreation grounded in the SwiftUI source" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KidBox — Mobile App UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<!-- Lucide icons — CDN substitution for the app's SF Symbols / Material icons (see readme ICONOGRAPHY section) -->
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; height: 100%; background: #EDEAE3; }
  #root { height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; box-sizing: border-box; }
  .kb-caption { position:absolute; bottom:8px; left:0; right:0; text-align:center; font:600 12px var(--kb-font-sans); color:#8a8578; }
</style>
</head>
<body>
<div id="root"></div>
<script src="ios-frame.jsx" type="text/babel" data-presets="react"></script>
<script src="Icons.jsx" type="text/babel" data-presets="react"></script>
<script src="LoginScreen.jsx" type="text/babel" data-presets="react"></script>
<script src="HomeScreen.jsx" type="text/babel" data-presets="react"></script>
<script src="DocumentsScreen.jsx" type="text/babel" data-presets="react"></script>
<script src="SettingsScreen.jsx" type="text/babel" data-presets="react"></script>
<script type="text/babel" data-presets="react">
function App() {
  const [screen, setScreen] = React.useState("login");
  const open = (id) => {
    if (id === "documents") setScreen("documents");
    else setScreen("home");
  };
  return (
    <div style={{ position: "relative" }}>
      <IOSDevice>
        {screen === "login" && <LoginScreen onLogin={() => setScreen("home")} />}
        {screen === "home" && <HomeScreen onOpenSettings={() => setScreen("settings")} onOpenCard={open} />}
        {screen === "documents" && <DocumentsScreen onBack={() => setScreen("home")} />}
        {screen === "settings" && <SettingsScreen onBack={() => setScreen("home")} />}
      </IOSDevice>
      <div className="kb-caption">
        {screen === "login" ? "Accedi per continuare" : "Tocca una card Home per aprire Documenti · ⚙️ per Impostazioni"}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
