<!-- @dsCard group="Colors" viewport="700x160" name="Brand Orange" subtitle="Primary accent + AI gradient" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--kb-bg);font-family:var(--kb-font-sans);}
  .row{display:flex;gap:10px;}
  .sw{flex:1;height:78px;border-radius:12px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:#fff;font-size:11px;font-weight:700;box-shadow:var(--kb-shadow-ios);}
  .sw span{opacity:.85;font-weight:600;display:block;}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--kb-orange)">--kb-orange<span>#E8833A</span></div>
    <div class="sw" style="background:var(--kb-orange-deep)">--kb-orange-deep<span>#C96A20</span></div>
    <div class="sw" style="background:var(--kb-orange-bubble)">--kb-orange-bubble<span>#F28C33</span></div>
    <div class="sw" style="background:linear-gradient(135deg,var(--kb-ai-orange),var(--kb-ai-orange-deep));color:#fff">--kb-ai-orange<span>gradient FAB</span></div>
    <div class="sw" style="background:var(--kb-orange-soft);color:var(--kb-orange-deep)">--kb-orange-soft<span>tint wash</span></div>
  </div>
</body></html>
