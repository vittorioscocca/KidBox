<!-- @dsCard group="Brand" viewport="700x160" name="Shadows" subtitle="Card, elevated & AI-glow shadow tokens" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--kb-bg);font-family:var(--kb-font-sans);}
  .row{display:flex;gap:20px;}
  .box{width:120px;height:70px;border-radius:14px;background:var(--kb-surface);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--kb-text-secondary);}
</style></head>
<body>
  <div class="row">
    <div class="box" style="box-shadow:var(--kb-shadow-ios)">iOS card</div>
    <div class="box" style="box-shadow:var(--kb-shadow-card)">Marketing card</div>
    <div class="box" style="box-shadow:var(--kb-shadow-lg)">Elevated / hover</div>
    <div class="box" style="box-shadow:var(--kb-shadow-ai);background:var(--kb-ai-orange);color:#fff">AI glow</div>
  </div>
</body></html>
