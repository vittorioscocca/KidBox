<!-- @dsCard group="Spacing" viewport="700x140" name="Spacing Scale" subtitle="4/8-based scale used in card padding & grid gaps" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--kb-surface);font-family:var(--kb-font-sans);}
  .row{display:flex;align-items:flex-end;gap:10px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{width:22px;background:var(--kb-orange);border-radius:3px;}
  .lbl{font-size:10px;color:var(--kb-text-secondary);font-family:monospace;}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:8px"></div><span class="lbl">4</span></div>
    <div class="col"><div class="bar" style="height:12px"></div><span class="lbl">6</span></div>
    <div class="col"><div class="bar" style="height:16px"></div><span class="lbl">8</span></div>
    <div class="col"><div class="bar" style="height:20px"></div><span class="lbl">10</span></div>
    <div class="col"><div class="bar" style="height:24px"></div><span class="lbl">12</span></div>
    <div class="col"><div class="bar" style="height:28px"></div><span class="lbl">14</span></div>
    <div class="col"><div class="bar" style="height:32px"></div><span class="lbl">16</span></div>
    <div class="col"><div class="bar" style="height:40px"></div><span class="lbl">20</span></div>
    <div class="col"><div class="bar" style="height:48px"></div><span class="lbl">24</span></div>
    <div class="col"><div class="bar" style="height:64px"></div><span class="lbl">32</span></div>
  </div>
</body></html>
