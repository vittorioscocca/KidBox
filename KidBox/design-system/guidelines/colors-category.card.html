<!-- @dsCard group="Colors" viewport="700x260" name="Category Colors" subtitle="Home-grid tile tints (one per section)" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--kb-bg);font-family:var(--kb-font-sans);}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
  .sw{height:70px;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:6px;color:#fff;font-size:10px;font-weight:700;}
</style></head>
<body>
  <div class="grid">
    <div class="sw" style="background:var(--kb-cat-yellow);color:#3a2c00">Note<span>yellow</span></div>
    <div class="sw" style="background:var(--kb-cat-blue)">To-Do<span>blue</span></div>
    <div class="sw" style="background:var(--kb-cat-green)">Spesa/Chat<span>green</span></div>
    <div class="sw" style="background:var(--kb-cat-purple)">Calendario<span>purple</span></div>
    <div class="sw" style="background:var(--kb-cat-red)">Salute<span>red</span></div>
    <div class="sw" style="background:var(--kb-cat-orange)">Docs/Pets<span>orange</span></div>
    <div class="sw" style="background:var(--kb-cat-mint)">Spese<span>mint</span></div>
    <div class="sw" style="background:var(--kb-cat-indigo)">Wallet<span>indigo</span></div>
    <div class="sw" style="background:var(--kb-cat-key)">Password<span>key</span></div>
    <div class="sw" style="background:var(--kb-cat-cyan)">Posizione<span>cyan</span></div>
    <div class="sw" style="background:var(--kb-cat-pink)">Foto<span>pink</span></div>
    <div class="sw" style="background:var(--kb-cat-teal)">Family/Viaggi<span>teal</span></div>
    <div class="sw" style="background:var(--kb-cat-brown)">Casa<span>brown</span></div>
    <div class="sw" style="background:var(--kb-cat-ink)">Garage<span>ink</span></div>
  </div>
</body></html>
